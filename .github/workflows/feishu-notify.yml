name: Feishu Notify

on:
  push:
    branches:
      - main
      - master
      - release/**
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  issues:
    types:
      - opened
      - reopened
      - closed
  issue_comment:
    types:
      - created
  release:
    types:
      - published

jobs:
  notify:
    uses: Apifox-Test-Group/.github/.github/workflows/feishu-notify.yml@main
    secrets:
      FEISHU_WEBHOOK_TEST: ${{ secrets.FEISHU_WEBHOOK_TEST }}
      FEISHU_SIGNKEY_TEST: ${{ secrets.FEISHU_SIGNKEY_TEST }}
      FEISHU_WEBHOOK_GROUP_2: ${{ secrets.FEISHU_WEBHOOK_GROUP_2 }}
      FEISHU_SIGNKEY_GROUP_2: ${{ secrets.FEISHU_SIGNKEY_GROUP_2 }}
